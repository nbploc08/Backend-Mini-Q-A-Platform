name: qa-platform-prod

services:
  postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 10

  nats:
    image: nats:2.10
    restart: always
    command: ['-js']
    # Không expose monitoring port ra ngoài

  redis:
    image: redis:7-alpine
    restart: always
    command: ['redis-server', '--appendonly', 'yes', '--requirepass', '${REDIS_PASSWORD}']
    volumes:
      - redis_data:/data

  gateway:
    build:
      context: ..
      dockerfile: apps/gateway/Dockerfile
    restart: always
    ports:
      - '${GATEWAY_PORT:-8000}:8000'
    env_file: .env.prod
    environment:
      PORT: 8000
      SERVICE_NAME: gateway
      DATABASE_URL: ${DATABASE_URL_GATEWAY}
      AUTH_SERVICE_URL: http://auth-service:8001
      NOTIFICATION_SERVICE_URL: http://notification-service:8002
      CONTENT_SERVICE_URL: http://content-service:8003
    depends_on:
      postgres: { condition: service_healthy }
      nats: { condition: service_started }
      redis: { condition: service_started }

  auth-service:
    build:
      context: ..
      dockerfile: apps/auth-service/Dockerfile
    restart: always
    env_file: .env.prod
    environment:
      PORT: 8001
      SERVICE_NAME: auth-service
      DATABASE_URL: ${DATABASE_URL_AUTH}
      AUTH_SERVICE_URL: http://auth-service:8001
    depends_on:
      postgres: { condition: service_healthy }
      nats: { condition: service_started }
      redis: { condition: service_started }

  content-service:
    build:
      context: ..
      dockerfile: apps/content-service/Dockerfile
    restart: always
    env_file: .env.prod
    environment:
      PORT: 8003
      SERVICE_NAME: content-service
      DATABASE_URL: ${DATABASE_URL_CONTENT}
      AUTH_SERVICE_URL: http://auth-service:8001
    depends_on:
      postgres: { condition: service_healthy }
      nats: { condition: service_started }
      redis: { condition: service_started }

  notification-service:
    build:
      context: ..
      dockerfile: apps/notification-service/Dockerfile
    restart: always
    env_file: .env.prod
    environment:
      PORT: 8002
      SERVICE_NAME: notification-service
      DATABASE_URL: ${DATABASE_URL_NOTIFICATION}
      AUTH_SERVICE_URL: http://auth-service:8001
    depends_on:
      postgres: { condition: service_healthy }
      nats: { condition: service_started }
      redis: { condition: service_started }

volumes:
  pg_data:
  redis_data:
